<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vizzible</title>
  <meta
    name="description"
    content="digital presence for businesses whose work is better than their online presence."
  />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --grey: #888;
      --border: #222;
      --accent: #19d36b;
    }

    html, body {
      height: 100%;
    }

    html {
      scroll-behavior: smooth;
      overflow: hidden;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: Georgia, serif;
      font-size: 16px;
      line-height: 1.6;
      overflow: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes lineGrow {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 28px 48px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .nav-logo,
    .nav-cta {
      pointer-events: auto;
    }

    .nav-logo img {
      height: 64px;
    }

    .nav-cta {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey);
      text-decoration: none;
      opacity: 0;
      animation: fadeIn 1s ease 0.4s forwards;
    }

    .nav-cta:hover {
      color: var(--white);
    }

    .scroller {
      height: 100vh;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
    }

    .snap-section {
      height: 100vh;
      padding: 100px 48px 72px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      scroll-snap-align: start;
    }

    .hero {
      justify-content: flex-end;
    }

    .hero-headline {
      font-size: clamp(42px, 8vw, 96px);
      line-height: 1.05;
      max-width: 800px;
      animation: fadeUp 1.2s ease forwards;
    }

    .section-label {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 60px;
    }

    .services-list {
      list-style: none;
      max-width: 500px;
    }

    .services-list li {
      display: flex;
      justify-content: space-between;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      font-size: 18px;
    }

    .service-status {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .pipeline {
      max-width: 700px;
    }

    .pipeline-item {
      display: flex;
      justify-content: space-between;
      padding: 24px 0;
      border-top: 1px solid var(--border);
    }

    .contact-block {
      padding-top: 18vh;
    }

    .contact-email {
      font-family: Arial, sans-serif;
      font-size: 16px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .contact-footer {
      position: absolute;
      bottom: 28px;
      left: 48px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: var(--grey);
    }

    @media (max-width: 768px) {
      .nav-logo img {
        height: 44px;
      }
    }
  </style>
</head>

<body>

<nav>
  <a class="nav-logo"><img src="logo.jpg" /></a>
  <a href="#contact" class="nav-cta">get visible</a>
</nav>

<main class="scroller">

<section class="snap-section hero">
  <h1 class="hero-headline">we see you.<br>the world will too.</h1>
</section>

<section class="snap-section">
  <p class="section-label">services & pricing</p>
  <ul class="services-list">
    <li><span>website</span><span class="service-status">€1k+</span></li>
    <li><span>website + positioning</span><span class="service-status">€1.5k+</span></li>
  </ul>
</section>

<section class="snap-section">
  <p class="section-label">in progress</p>
  <div class="pipeline">
    <div class="pipeline-item"><span>swimfree.style</span><span>live</span></div>
    <div class="pipeline-item"><span>artist portfolio</span><span>building</span></div>
  </div>
</section>

<section class="snap-section" id="contact">
  <div class="contact-block">
    <a href="mailto:hello@vizzible.co" class="contact-email">
      hello@vizzible.co
    </a>
  </div>

  <div class="contact-footer">
    ©2026 vizzible
  </div>
</section>

</main>

</body>
</html>
