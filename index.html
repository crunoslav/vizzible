<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vizzible</title>
  <meta
    name="description"
    content="digital presence for businesses whose work is better than their online presence."
  />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --grey: #888;
      --border: #222;
      --accent: #19d36b;
    }

    html, body {
      height: 100%;
    }

    html {
      scroll-behavior: smooth;
      overflow: hidden;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: Georgia, serif;
      font-size: 16px;
      line-height: 1.6;
      overflow: hidden;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes lineGrow {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .nav-logo,
    .nav-cta {
      pointer-events: auto;
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      opacity: 0;
      animation: fadeIn 1s ease 0.2s forwards;
    }

    .nav-logo img {
      display: block;
      height: 30px;
      width: auto;
      object-fit: contain;
    }

    .nav-cta {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey);
      text-decoration: none;
      transition: color 0.3s ease;
      opacity: 0;
      animation: fadeIn 1s ease 0.4s forwards;
    }

    .nav-cta:hover {
      color: var(--white);
    }

    .scroller {
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    .snap-section {
      height: 100vh;
      min-height: 100vh;
      padding: 100px 48px 72px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .hero {
      justify-content: flex-end;
      overflow: hidden;
      padding-bottom: 80px;
    }

    .hero-headline {
      font-size: clamp(42px, 8vw, 96px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 800px;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1.35s ease 0.5s forwards;
      position: relative;
      z-index: 2;
    }

    .hero-line {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border);
      transform-origin: left;
      transform: scaleX(0);
      animation: lineGrow 1.6s ease 1.2s forwards;
      z-index: 1;
    }

    .section-label {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 60px;
    }

    /* rest unchanged... */

    @media (max-width: 768px) {
      nav,
      .snap-section {
        padding-left: 24px;
        padding-right: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .nav-logo,
      .nav-cta,
      .hero-headline,
      .hero-line,
      .pipeline-dot {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      .reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="#" class="nav-logo" aria-label="vizzible home">
      <img src="logo.jpg" alt="vizzible logo" />
    </a>
    <a href="#contact" class="nav-cta">get visible</a>
  </nav>

  <main class="scroller">
    <section class="snap-section hero">
      <h1 class="hero-headline">we see you.<br>the world will too.</h1>
      <div class="hero-line"></div>
    </section>

    <!-- rest of your HTML unchanged -->

  </main>

  <script>
    const scroller = document.querySelector(".scroller");

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) entry.target.classList.add("visible");
        });
      },
      {
        root: scroller,
        threshold: 0.12,
        rootMargin: "0px 0px -40px 0px"
      }
    );

    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
  </script>
</body>
</html>
